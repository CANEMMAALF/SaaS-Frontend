<div class="page-container fade-in">
  <app-breadcrumb [paths]="breadcrumbs"></app-breadcrumb>

  <div class="page-header">
    <div class="title-row">
      <h1 class="page-title">Gestión de Propiedades</h1>
      <button class="btn-primary btn-animate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Nueva Propiedad
      </button>
    </div>
  </div>

  <div class="content-wrapper">
    <!-- Aquí implementamos nuestro app-table mágico -->
    <app-table [data]="misPropiedades" [columnas]="tableColumns" [acciones]="tableActions" [loading]="isLoading"
      [page]="1" [totalPaginas]="3" [totalItems]="24" (paginaChange)="onPageChange($event)"
      (accionClick)="onActionClicked($event)">
    </app-table>
  </div>
</div>
