<div class="table-container fade-in">
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <span>Cargando datos...</span>
  </div>

  <div class="table-responsive">
    <table class="data-table" [class.is-loading]="loading">
      <thead>
        <tr>
          <th *ngFor="let col of columnas" [ngClass]="col.cssClass">{{ col.header }}</th>
          <th *ngIf="acciones.length > 0" class="actions-header">Acciones</th>
        </tr>
      </thead>
      
      <tbody>
        <!-- Empty State -->
        <tr *ngIf="data.length === 0 && !loading">
          <td [attr.colspan]="columnas.length + (acciones.length > 0 ? 1 : 0)" class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            <p>No hay datos disponibles para mostrar.</p>
          </td>
        </tr>

        <!-- Data Rows -->
        <tr *ngFor="let item of data; trackBy: trackByIndex" class="table-row">
          <td *ngFor="let col of columnas" [ngClass]="col.cssClass">
            <!-- Valor normal (aquí conectaremos el Custom Pipe en el futuro) -->
            <span>{{ item[col.key] }}</span>
          </td>
          
          <!-- Actions Column -->
          <td *ngIf="acciones.length > 0">
            <div class="actions-wrapper">
              <ng-container *ngFor="let acc of acciones">
                <button 
                  *ngIf="acc.condition(item)" 
                  class="btn-action btn-animate" 
                  [ngClass]="acc.cssClass"
                  (click)="onAccionClick(item, acc)">
                    <i *ngIf="acc.icon" [class]="acc.icon"></i>
                    {{ acc.label }}
                </button>
              </ng-container>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Paginador Minimalista (Anterior / Siguiente) -->
  <div class="pagination-footer" *ngIf="totalPaginas > 1">
    <span class="text-secondary">Página <strong>{{ page }}</strong> de {{ totalPaginas }} <span class="total-items">({{ totalItems }} registros)</span></span>
    <div class="pagination-actions">
      <button class="btn-page btn-animate" [disabled]="page === 1" (click)="paginaAnterior()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Anterior
      </button>
      <button class="btn-page btn-animate" [disabled]="page === totalPaginas || loading" (click)="paginaSiguiente()">
        Siguiente
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </div>
</div>
