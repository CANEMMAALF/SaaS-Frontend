<header class="topbar">
  <!-- Integración de Módulo Breadcrumb -->
  <div class="topbar-left">
    <app-breadcrumb [paths]="currentPath"></app-breadcrumb>
  </div>
  
  <div class="topbar-right">
    <!-- Componente de Perfil Integrado -->
    <div class="avatar-profile">
      <div class="avatar-circle">AD</div>
      <div class="avatar-info">
        <span class="user-name">Administrador</span>
        <span class="user-role">Súper Admin</span>
      </div>
    </div>
    
    <!-- Botón Ghost Inyectado desde el Sistema Angular -->
    <app-button variant="ghost" color="danger" (click)="cerrarSesion()">
      Cerrar Sesión
    </app-button>
  </div>
</header>
